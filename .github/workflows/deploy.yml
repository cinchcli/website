name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write   # needed for Cloudflare Pages deployment status
      pull-requests: write # needed to post preview URL as a PR comment

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # PUBLIC_* are inlined at astro build time. This workflow builds on GitHub, so
      # Cloudflare Pages dashboard env vars do NOT apply — set GitHub Actions secrets instead.
      - name: Build
        env:
          PUBLIC_TELEMETRY_URL: ${{ secrets.PUBLIC_TELEMETRY_URL }}
          PUBLIC_TELEMETRY_API_KEY: ${{ secrets.PUBLIC_TELEMETRY_API_KEY }}
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy dist
            --project-name cinchcli-website
            --branch ${{ github.head_ref || github.ref_name }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            if (!url) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 Preview deployed: ${url}`,
            });
